<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Open</title>
    <style>
      :root {
        --bg: rgba(8, 28, 27, 0.9);
        --border: rgba(96, 214, 186, 0.24);
        --text: #ebfffb;
        --muted: #9dd6ca;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
      }

      .panel {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: var(--bg);
        box-shadow: 0 14px 45px rgba(1, 14, 12, 0.45);
        color: var(--text);
        padding: 14px 14px 12px;
      }

      .title {
        font-size: 14px;
        font-weight: 600;
      }

      .subtitle {
        margin-top: 4px;
        font-size: 12px;
        color: var(--muted);
        flex: 0 0 auto;
      }

      .workspace {
        margin-top: 10px;
        display: grid;
        grid-template-rows: auto 416px auto;
        gap: 8px;
        flex: 1 1 auto;
        min-height: 0;
      }

      .breadcrumb-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
        min-height: 30px;
        max-height: 30px;
        overflow: hidden;
      }

      .list-shell {
        position: relative;
        height: 416px;
        min-height: 416px;
      }

      .list-frame {
        position: relative;
        height: 100%;
        background: rgba(16, 52, 48, 0.24);
      }

      .list-body {
        position: absolute;
        left: 0;
        right: 0;
        top: 36px;
        bottom: 36px;
        min-height: 0;
      }

      .breadcrumb-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(99, 220, 190, 0.5);
        background: rgba(44, 124, 106, 0.28);
        border-radius: 5px;
        padding: 6px 9px;
        min-width: 0;
        max-width: 148px;
        font-size: 11px;
        color: #e8fffb;
        cursor: pointer;
      }

      .breadcrumb-sep,
      .breadcrumb-ellipsis {
        color: rgba(184, 239, 225, 0.72);
        font-size: 11px;
        pointer-events: none;
      }

      .chip-label {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .directory-list {
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 6px 6px 6px 2px;
        background: rgba(16, 52, 48, 0.32);
        border-radius: 0;
        border: none;
      }

      .folder-row {
        margin-top: 0;
      }

      .panel-view-list .folder-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .panel-view-list .folder-chip {
        width: 100%;
        justify-content: flex-start;
        min-height: 34px;
      }

      .panel-view-tile .folder-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .panel-view-tile .folder-chip {
        width: 100%;
        min-height: 66px;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 5px;
        padding: 8px 6px;
        text-align: center;
      }

      .panel-view-tile .chip-icon {
        font-size: 16px;
      }

      .panel-view-tile .folder-chip .chip-label {
        max-width: 100%;
        white-space: normal;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .panel-view-tile.panel-tile-medium .folder-row {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
      }

      .panel-view-tile.panel-tile-medium .folder-chip {
        min-height: 58px;
        padding: 6px 4px;
      }

      .panel-view-tile.panel-tile-medium .chip-icon {
        font-size: 14px;
      }

      .panel-view-tile.panel-tile-medium .folder-chip .chip-label {
        font-size: 11px;
      }

      .panel-view-tile.panel-tile-small .folder-row {
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 4px;
      }

      .panel-view-tile.panel-tile-small .folder-chip {
        min-height: 50px;
        padding: 4px 2px;
      }

      .panel-view-tile.panel-tile-small .chip-icon {
        font-size: 12px;
      }

      .panel-view-tile.panel-tile-small .folder-chip .chip-label {
        font-size: 10px;
      }

      .folder-chip {
        border: 1px solid rgba(138, 233, 210, 0.42);
        background: rgba(96, 214, 186, 0.14);
        border-radius: 10px;
        padding: 8px 10px;
        font-size: 12px;
        color: #ebfffb;
        min-width: 0;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }

      .folder-chip:hover,
      .breadcrumb-chip:hover {
        background: rgba(108, 228, 200, 0.24);
      }

      .chip-icon {
        font-size: 13px;
        line-height: 1;
      }

      .chip-label {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .empty {
        display: none;
        border: 1px dashed rgba(130, 228, 205, 0.5);
        border-radius: 12px;
        padding: 20px 16px;
        font-size: 13px;
        color: #d2fff2;
        text-align: center;
      }

      .meta {
        margin-top: 2px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 11px;
        color: #afddd2;
      }

      .scroll-zone {
        position: absolute;
        left: 8px;
        right: 8px;
        height: 18px;
        border-radius: 6px;
        border: 1px solid rgba(96, 214, 186, 0.45);
        background: rgba(40, 85, 75, 0.72);
        color: rgba(184, 239, 225, 0.88);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        cursor: pointer;
        z-index: 10;
        visibility: hidden;
        pointer-events: none;
        transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease;
      }

      .scroll-zone.show {
        visibility: visible;
        pointer-events: auto;
      }

      .scroll-zone.top {
        top: 2px;
      }

      .scroll-zone.bottom {
        bottom: 2px;
      }

      .scroll-zone.active {
        border-color: rgba(121, 234, 187, 0.85);
        background: rgba(56, 130, 110, 0.86);
        color: #d8fff0;
      }
    </style>
  </head>
  <body>
    <main class="panel panel-view-list">
      <div class="title">快速打开</div>
      <div class="subtitle">右键热区触发，悬停下钻，单击立即打开</div>

      <section class="workspace">
        <div class="breadcrumb-row" data-breadcrumbs></div>
        <div class="list-shell">
          <div class="list-frame">
            <div class="scroll-zone top" data-scroll-zone="up">↑</div>
            <div class="list-body">
              <div class="directory-list" data-directory-list>
                <div class="folder-row" data-directory-items></div>
              </div>
              <div class="empty" data-empty-state>暂无可展示目录</div>
            </div>
            <div class="scroll-zone bottom" data-scroll-zone="down">↓</div>
          </div>
        </div>
        <div class="meta">
          <span data-child-hint></span>
          <span data-child-meta></span>
        </div>
      </section>
    </main>

    <script type="module">
      import { createQuickOpenController } from "./quick-open-controller.js";

      const scrollZoneUp = document.querySelector("[data-scroll-zone='up']");
      const scrollZoneDown = document.querySelector("[data-scroll-zone='down']");
      let scrollZoneTicker = null;

      function startZoneScroll(direction) {
        if (scrollZoneTicker) {
          return;
        }
        scrollZoneTicker = setInterval(() => {
          const directoryList = document.querySelector("[data-directory-list]");
          if (directoryList) {
            const delta = direction === "down" ? 10 : -10;
            directoryList.scrollBy({ top: delta, behavior: "auto" });
          }
        }, 60);
      }

      function stopZoneScroll() {
        if (scrollZoneTicker) {
          clearInterval(scrollZoneTicker);
          scrollZoneTicker = null;
        }
        if (scrollZoneUp) {
          scrollZoneUp.classList.remove("active");
        }
        if (scrollZoneDown) {
          scrollZoneDown.classList.remove("active");
        }
      }

      if (scrollZoneUp) {
        scrollZoneUp.addEventListener("mouseenter", () => {
          scrollZoneUp.classList.add("active");
          startZoneScroll("up");
        });
        scrollZoneUp.addEventListener("mouseleave", stopZoneScroll);
      }

      if (scrollZoneDown) {
        scrollZoneDown.addEventListener("mouseenter", () => {
          scrollZoneDown.classList.add("active");
          startZoneScroll("down");
        });
        scrollZoneDown.addEventListener("mouseleave", stopZoneScroll);
      }

      const controller = createQuickOpenController({ root: document });

      const panelEl = document.querySelector(".panel");
      panelEl.addEventListener("mouseleave", () => {
        controller.close();
      });

      window.addEventListener("contextmenu", (event) => {
        event.preventDefault();
        controller.close();
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          event.preventDefault();
          controller.close();
        }
      });
    </script>
  </body>
</html>
