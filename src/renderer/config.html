<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dragFree Config</title>
    <style>
      :root {
        --bg: #f6f8fb;
        --card: #ffffff;
        --text: #172033;
        --subtle: #54617a;
        --accent: #1f6feb;
        --ok: #1f8f4d;
        --warn: #a46a00;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 10px;
        height: 100vh;
        overflow: hidden;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        background: linear-gradient(150deg, #eef4ff 0%, var(--bg) 55%, #f9f7ff 100%);
        color: var(--text);
      }

      .card {
        background: var(--card);
        border: 1px solid #dfe6f4;
        border-radius: 16px;
        padding: 12px;
        box-shadow: 0 12px 30px rgba(23, 32, 51, 0.08);
        height: calc(100vh - 20px);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
      }

      .top-bar {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 10px;
        margin-bottom: 8px;
      }

      #add-folder {
        margin-left: auto;
      }

      .gear-btn {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        border: 1px solid #c8d6f3;
        background: #eef3ff;
        color: #2f4677;
        font-size: 16px;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }

      p {
        margin: 8px 0 0;
        color: var(--subtle);
        line-height: 1.5;
      }

      .section-title {
        margin: 16px 0 8px;
        font-size: 13px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #3d4d6b;
      }

      .status-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .status-chip {
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 12px;
        border: 1px solid #ced9f2;
        background: #eef3ff;
        color: #344c80;
      }

      .status-chip.done {
        background: #e8f8ef;
        border-color: #b7e6c9;
        color: var(--ok);
      }

      .status-chip.current {
        background: #fff5e8;
        border-color: #ffd7a5;
        color: var(--warn);
      }

      .list {
        margin: 8px 0 0;
        padding-left: 18px;
        color: var(--subtle);
        line-height: 1.5;
      }

      .list li {
        margin: 4px 0;
      }

      .pill {
        display: inline-block;
        margin-top: 14px;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        color: var(--accent);
        background: #e8f0ff;
        border: 1px solid #cadeff;
      }

      .settings-panel {
        margin-top: 10px;
        border: 1px solid #d7e2f8;
        border-radius: 12px;
        padding: 0;
        background: #ffffff;
        display: none;
        flex-direction: column;
        min-height: 0;
        max-height: 42vh;
        overflow: hidden;
      }

      .settings-panel.show {
        display: flex;
      }

      .settings-panel-body {
        flex: 1 1 auto;
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
        padding: 12px 14px 14px;
      }

      .card.settings-focus {
        gap: 0;
      }

      .card.settings-focus .top-bar,
      .card.settings-focus .folder-list,
      .card.settings-focus #save-status {
        display: none;
      }

      .card.settings-focus .settings-panel.show {
        margin-top: 0;
        max-height: none;
        flex: 1 1 auto;
      }

      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        padding: 14px 14px 12px;
        margin-bottom: 0;
        border-bottom: 1px solid #e8eef8;
        background: #ffffff;
        border-radius: 12px 12px 0 0;
        box-shadow: 0 1px 0 rgba(23, 32, 51, 0.04);
        z-index: 2;
      }

      .modal-section-label {
        margin: 0 0 10px;
        font-size: 13px;
        font-weight: 600;
        color: #2f4677;
      }

      .modal-section-label.spaced {
        margin-top: 18px;
      }

      .modal-actions {
        margin-top: 12px;
        display: flex;
        justify-content: flex-end;
      }

      .title-tip {
        display: none;
        font-size: 11px;
        color: #1f8f4d;
      }

      .title-tip.show {
        display: inline;
      }

      .title-tip.title-tip-removed {
        color: #c53030;
      }

      .top-bar h3 .title-tip {
        margin-left: 8px;
      }

      .top-bar h3 .changed-tip {
        margin-left: 8px;
      }

      .grid {
        margin-top: 12px;
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-content: start;
      }

      .grid.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      label {
        display: block;
        font-size: 12px;
        color: #435474;
      }

      .label-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .changed-tip {
        display: none;
        font-size: 11px;
        color: #1f8f4d;
      }

      .changed-tip.visible {
        display: inline;
      }

      .changed-tip[data-tip-for="folders-list"] {
        color: #ca8a04;
      }

      input,
      select {
        margin-top: 6px;
        width: 100%;
        border: 1px solid #ccd8f0;
        border-radius: 8px;
        padding: 7px 8px;
        font-size: 13px;
      }

      .color-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 6px;
      }

      .color-settings {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .color-setting-item {
        padding: 2px 0;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 6px;
      }

      .color-setting-head {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 6px;
        font-size: 12px;
        color: #435474;
      }

      .color-inline {
        display: inline-flex;
        align-items: center;
        margin-top: 0;
        margin-left: 2px;
      }

      .settings-group-card {
        grid-column: 1 / -1;
        border: 1px solid #d7e2f8;
        border-radius: 10px;
        background: #f8fbff;
        padding: 10px;
      }

      .settings-group-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .display-settings-footer {
        margin-top: 6px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .opacity-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        flex: 1 1 auto;
      }

      .opacity-head {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: #435474;
      }

      .opacity-control {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 300px;
      }

      .popup-toggle-row {
        grid-column: 1 / -1;
        margin-top: 0;
      }

      .section-label-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .toggle-row {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
        font-size: 12px;
        color: #435474;
      }

      .toggle-row input[type="checkbox"] {
        margin: 0;
        width: 14px;
        height: 14px;
      }

      #hotzone-color,
      #hotzone-titlebar-color,
      #hotzone-text-color {
        margin-top: 0;
        width: 22px;
        height: 22px;
        padding: 0;
        border-radius: 6px;
        border: 1px solid #ccd8f0;
        background: #fff;
        cursor: pointer;
      }

      .reset-link-btn {
        border: none;
        background: transparent;
        color: #5d6d8d;
        text-decoration: underline;
        text-underline-offset: 2px;
        font-size: 12px;
        padding: 0;
        cursor: pointer;
      }

      .reset-link-btn:hover {
        color: #3c4f77;
      }

      .toggle-group {
        grid-column: 1 / -1;
        display: grid;
        gap: 8px;
        border: 1px solid #d7e2f8;
        border-radius: 10px;
        background: #f8fbff;
        padding: 10px;
      }

      .toggle-group-title {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        color: #2f4677;
      }

      .toggle-split-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        align-items: center;
      }

      .toggle-split-row .toggle-row {
        margin-top: 0;
      }

      #hotzone-color::-webkit-color-swatch-wrapper,
      #hotzone-titlebar-color::-webkit-color-swatch-wrapper,
      #hotzone-text-color::-webkit-color-swatch-wrapper {
        padding: 0;
      }

      #hotzone-color::-webkit-color-swatch,
      #hotzone-titlebar-color::-webkit-color-swatch,
      #hotzone-text-color::-webkit-color-swatch {
        border: none;
        border-radius: 5px;
      }

      .folder-list-wrap {
        position: relative;
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .folder-list {
        margin-top: 0;
        display: grid;
        grid-template-columns: 1fr;
        grid-auto-rows: min-content;
        align-content: start;
        gap: 6px;
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        padding: 6px;
        border: 1px solid #d6e0f5;
        border-radius: 12px;
        background: #f6f9ff;
      }

      .folder-drag-reorder-hint {
        position: absolute;
        left: 8px;
        bottom: 8px;
        z-index: 4;
        max-width: min(280px, calc(100% - 20px));
        pointer-events: none;
        font-size: 11px;
        line-height: 1.4;
        color: #2f4677;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid #c8d6f3;
        border-radius: 8px;
        padding: 6px 10px;
        box-shadow: 0 2px 12px rgba(23, 32, 51, 0.1);
      }

      .folder-drag-reorder-hint[hidden] {
        display: none !important;
      }

      .folder-list-wrap.folder-drag-hint-visible .folder-list {
        padding-bottom: 44px;
      }

      .folder-item {
        border: 1px solid #d6e0f5;
        border-radius: 10px;
        padding: 6px 8px;
        background: #ffffff;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 6px 10px;
        min-height: 48px;
      }

      .folder-drag-handle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        min-height: 36px;
        flex-shrink: 0;
        border-radius: 8px;
        color: #6a7892;
        font-size: 12px;
        line-height: 1;
        letter-spacing: -1px;
        cursor: grab;
        user-select: none;
      }

      .folder-drag-handle:hover {
        background: rgba(31, 111, 235, 0.08);
        color: #2f4677;
      }

      .folder-drag-handle:active {
        cursor: grabbing;
      }

      .folder-item.folder-item-dragging {
        opacity: 0.5;
      }

      .folder-item.folder-drag-over-before {
        box-shadow: inset 0 3px 0 0 #1f6feb;
      }

      .folder-item.folder-drag-over-after {
        box-shadow: inset 0 -3px 0 0 #1f6feb;
      }

      .folder-main {
        grid-column: 2 / 3;
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 4px;
      }

      .folder-name {
        min-width: 0;
        font-size: 13px;
        color: #1c2942;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .folder-path-inline {
        min-width: 0;
        font-size: 12px;
        color: #6a7892;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .actions {
        display: flex;
        gap: 6px;
        grid-column: 3 / 4;
        align-self: center;
      }

      .icon-btn {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        border: 1px solid #c8d6f3;
        background: #eef3ff;
        color: #2f4677;
        font-size: 12px;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }

      .actions .icon-btn {
        padding: 0;
      }

      .icon-btn.add {
        width: 26px;
        height: 26px;
        font-size: 16px;
      }

      .actions button,
      .toolbar button,
      .save-bar button,
      .modal-actions button {
        border: 1px solid #c8d6f3;
        background: #eef3ff;
        color: #2f4677;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
      }

      .muted {
        font-size: 12px;
        color: #5c6d8a;
      }

      #save-status {
        min-height: 18px;
        margin: 0;
      }

      #tile-size-wrap {
        visibility: hidden;
        pointer-events: none;
      }

      #tile-size-wrap.show {
        visibility: visible;
        pointer-events: auto;
      }

      @media (max-width: 620px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .settings-group-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main id="config-card" class="card">
      <div class="top-bar">
        <h3 style="margin: 0">
          常用文件夹
          <span id="folder-added-tip" class="title-tip">已添加</span>
          <span id="folder-removed-tip" class="title-tip title-tip-removed">已删除</span>
          <span class="changed-tip" data-tip-for="folders-list">已修改</span>
        </h3>
        <button id="add-folder" class="icon-btn add" type="button" title="添加文件夹" aria-label="添加文件夹">+</button>
        <button id="open-display-config" class="gear-btn" type="button" title="显示与系统设置" aria-label="显示与系统设置">⚙</button>
      </div>
      <div class="folder-list-wrap">
        <div id="folder-list" class="folder-list"></div>
        <div id="folder-drag-reorder-hint" class="folder-drag-reorder-hint" hidden aria-hidden="true">
          移动到滚动条上、下两端可实现滚动
        </div>
      </div>

      <p id="save-status" class="muted"></p>

      <section id="display-config-modal" class="settings-panel" aria-label="配置">
          <div class="modal-head">
            <h3 style="margin: 0">配置</h3>
            <button id="save-display-config" type="button">收起设置</button>
          </div>
          <div class="settings-panel-body">
          <div class="section-label-row">
            <div class="modal-section-label">显示设置</div>
            <button id="reset-hotzone" class="reset-link-btn" type="button">重置热区属性</button>
          </div>
          <div class="grid">
            <div class="settings-group-card">
              <div class="color-settings">
                <div class="color-setting-item">
                  <span class="color-setting-head">
                    <span>热区颜色</span>
                    <span class="changed-tip" data-tip-for="hotzone-color">已更改</span>
                  </span>
                  <span class="color-inline">
                    <input id="hotzone-color" type="color" />
                  </span>
                </div>
                <div class="color-setting-item">
                  <span class="color-setting-head">
                    <span>标题栏颜色</span>
                    <span class="changed-tip" data-tip-for="hotzone-titlebar-color">已更改</span>
                  </span>
                  <span class="color-inline">
                    <input id="hotzone-titlebar-color" type="color" />
                  </span>
                </div>
              </div>
              <div class="display-settings-footer">
                <label class="opacity-row" style="margin: 0">
                  <span class="opacity-head">
                    <span>热区透明度（0-1）</span>
                    <span class="changed-tip" data-tip-for="hotzone-opacity">已更改</span>
                  </span>
                  <span class="opacity-control">
                    <input id="hotzone-opacity" type="range" min="0" max="1" step="0.01" />
                    <span id="hotzone-opacity-value" style="min-width: 44px; font-size: 12px; color: #435474">0.08</span>
                  </span>
                </label>
              </div>
            </div>
          </div>
          <div class="modal-section-label spaced">弹窗设置</div>
          <div class="grid">
            <div class="settings-group-card">
              <div class="settings-group-grid">
                <label>
                  <span class="label-row">
                    <span>面包屑分隔符</span>
                    <span class="changed-tip" data-tip-for="breadcrumb-separator">已更改</span>
                  </span>
                  <select id="breadcrumb-separator">
                    <option value="/">/（默认）</option>
                    <option value=">">&gt;</option>
                  </select>
                </label>
                <label>
                  <span class="label-row">
                    <span>悬停查询延时（毫秒）</span>
                    <span class="changed-tip" data-tip-for="hover-query-delay">已更改</span>
                  </span>
                  <input id="hover-query-delay" type="number" min="100" max="2000" step="50" />
                </label>
                <label>
                  <span class="label-row">
                    <span>查询冷却时长（秒）</span>
                    <span class="changed-tip" data-tip-for="query-cooldown">已更改</span>
                  </span>
                  <input id="query-cooldown" type="number" min="0" max="5" step="0.1" />
                </label>
                <label>
                  <span class="label-row">
                    <span>快开悬停延时（毫秒）</span>
                    <span class="changed-tip" data-tip-for="quick-open-hover-delay">已更改</span>
                  </span>
                  <input id="quick-open-hover-delay" type="number" min="200" max="3000" step="100" />
                </label>
                <label class="toggle-row popup-toggle-row">
                  <input id="open-target-folder-on-success" type="checkbox" />
                  <span>投放成功后打开目标文件夹</span>
                  <span class="changed-tip" data-tip-for="open-target-folder-on-success">已更改</span>
                </label>
                <label>
                  <span class="label-row">
                    <span>默认处理方式</span>
                    <span class="changed-tip" data-tip-for="default-action">已更改</span>
                  </span>
                  <select id="default-action">
                    <option value="copy">复制</option>
                    <option value="move">移动</option>
                  </select>
                </label>
                <label>
                  <span class="label-row">
                    <span>面板与快开目录样式</span>
                    <span class="changed-tip" data-tip-for="panel-view-mode">已更改</span>
                  </span>
                  <select id="panel-view-mode">
                    <option value="list">列表（推荐）</option>
                    <option value="tile">平铺</option>
                  </select>
                </label>
                <label id="tile-size-wrap">
                  <span class="label-row">
                    <span>平铺尺寸（面板与快开共用）</span>
                    <span class="changed-tip" data-tip-for="panel-tile-size">已更改</span>
                  </span>
                  <select id="panel-tile-size">
                    <option value="large">大（3列）</option>
                    <option value="medium">中（5列）</option>
                    <option value="small">小（7列）</option>
                  </select>
                </label>
              </div>
            </div>
          </div>
          <div class="modal-section-label spaced">系统设置</div>
          <div class="grid">
            <div class="toggle-group">
              <div class="toggle-group-title">热区设置</div>
              <div class="toggle-split-row">
                <label class="toggle-row">
                  <input id="hotzone-text-bold" type="checkbox" />
                  <span>展示文本加粗</span>
                  <span class="changed-tip" data-tip-for="hotzone-text-bold">已更改</span>
                </label>
                <label class="color-setting-item">
                  <span class="color-setting-head">
                    <span>展示文本颜色</span>
                    <span class="changed-tip" data-tip-for="hotzone-text-color">已更改</span>
                  </span>
                  <span class="color-inline">
                    <input id="hotzone-text-color" type="color" />
                  </span>
                </label>
              </div>
              <label class="toggle-row">
                <input id="text-limit-enabled" type="checkbox" />
                <span>启用文本上限（1000字）</span>
                <span class="changed-tip" data-tip-for="text-limit-enabled">已更改</span>
              </label>
              <label class="toggle-row">
                <input id="drag-text-append-with-newline" type="checkbox" />
                <span>
                  拖拽文字追加时默认先换行
                  <span class="muted" style="display: block; margin-top: 4px; font-weight: 400; font-size: 12px">
                    取消换行可能会与链接格式内容产生冲突，导致链接识别错误。
                  </span>
                </span>
                <span class="changed-tip" data-tip-for="drag-text-append-with-newline">已更改</span>
              </label>
              <label class="toggle-row" style="align-items: flex-start">
                <input id="allow-cross-screen-move" type="checkbox" />
                <span>
                  允许跨屏拖动热区
                  <span class="muted" style="display: block; margin-top: 4px; font-weight: 400; font-size: 12px">
                    跨屏移动可能出现界面“假死”的状态，点击折叠▼按钮手动刷新后再试，该功能建议关闭。
                  </span>
                </span>
                <span class="changed-tip" data-tip-for="allow-cross-screen-move">已更改</span>
              </label>
              <label class="toggle-row">
                <input id="hotzone-bg-enabled" type="checkbox" />
                <span>启用热区背景图</span>
                <span class="changed-tip" data-tip-for="hotzone-bg-enabled">已更改</span>
              </label>
              <label>
                <span class="label-row">
                  <span>背景图填充模式</span>
                  <span class="changed-tip" data-tip-for="hotzone-bg-fill-mode">已更改</span>
                </span>
                <select id="hotzone-bg-fill-mode">
                  <option value="cover">铺满裁切（cover）</option>
                  <option value="contain">完整显示（contain）</option>

                  <option value="tile">平铺（tile）</option>

              <label>
                <span class="label-row">
                  <span>背景图对齐</span>
                  <span class="changed-tip" data-tip-for="hotzone-bg-position">已更改</span>

                <select id="hotzone-bg-position">
                  <option value="center center">居中</option>
                  <option value="left center">左侧居中</option>
                  <option value="right center">右侧居中</option>
                  <option value="center top">顶部居中</option>
                  <option value="center bottom">底部居中</option>
                </select>
              </label>
              <label>
                <span class="label-row">
                  <span>背景图文件</span>
                  <span class="changed-tip" data-tip-for="hotzone-bg-path">已更改</span>
                </span>
                <span class="color-row" style="gap: 6px">
                  <button id="hotzone-bg-pick" type="button">选择图片</button>
                  <input id="hotzone-bg-path" type="text" readonly placeholder="未选择背景图" />
                </span>
              </label>
              <label>
                <span class="label-row">
                  <span>背景图透明度（0-1）</span>
                  <span class="changed-tip" data-tip-for="hotzone-bg-opacity">已更改</span>
                </span>
                <span class="color-row" style="gap: 10px">
                  <input id="hotzone-bg-opacity" type="range" min="0" max="1" step="0.01" />
                  <span id="hotzone-bg-opacity-value" style="min-width: 44px; font-size: 12px; color: #435474">1.00</span>
                </span>
              </label>
              <label>
                <span class="label-row">
                  <span>背景图缩放（0.5-3）</span>
                  <span class="changed-tip" data-tip-for="hotzone-bg-scale">已更改</span>
                </span>
                <span class="color-row" style="gap: 10px">
                  <input id="hotzone-bg-scale" type="range" min="0.5" max="3" step="0.01" />
                  <span id="hotzone-bg-scale-value" style="min-width: 44px; font-size: 12px; color: #435474">1.00</span>
                </span>
              </label>
            </div>
            <div class="toggle-group">
              <div class="toggle-group-title">系统开关</div>
              <label class="toggle-row">
                <input id="launch-on-startup" type="checkbox" />
                <span>开机自启动（建议将程序放到固定目录后再开启）</span>
                <span class="changed-tip" data-tip-for="launch-on-startup">已更改</span>
              </label>
              <label class="toggle-row" style="align-items: flex-start">
                <input id="hotzone-debug-log-enabled" type="checkbox" />
                <span>
                  启用 hotzone 调试日志（hotzone-debug.log）
                  <span class="muted" style="display: block; margin-top: 4px; font-weight: 400; font-size: 12px">
                    建议关闭；仅在排查热区/显示问题时开启，会增加磁盘写入。
                  </span>
                </span>
                <span class="changed-tip" data-tip-for="hotzone-debug-log-enabled">已更改</span>
              </label>
            </div>
          </div>
          </div>
      </section>
    </main>

    <script type="module">
      const hotzoneColorEl = document.getElementById("hotzone-color");
      const hotzoneTextColorEl = document.getElementById("hotzone-text-color");
      const hotzoneTitlebarColorEl = document.getElementById("hotzone-titlebar-color");
      const hotzoneTextBoldEl = document.getElementById("hotzone-text-bold");
      const hotzoneOpacityEl = document.getElementById("hotzone-opacity");
      const hotzoneOpacityValueEl = document.getElementById("hotzone-opacity-value");
      const resetHotzoneEl = document.getElementById("reset-hotzone");
      const openDisplayConfigEl = document.getElementById("open-display-config");
      const saveDisplayConfigEl = document.getElementById("save-display-config");
      const displayConfigModalEl = document.getElementById("display-config-modal");
      const addFolderEl = document.getElementById("add-folder");
      const folderAddedTipEl = document.getElementById("folder-added-tip");
      const folderRemovedTipEl = document.getElementById("folder-removed-tip");
      const breadcrumbSeparatorEl = document.getElementById("breadcrumb-separator");
      const hoverQueryDelayEl = document.getElementById("hover-query-delay");
      const quickOpenHoverDelayEl = document.getElementById("quick-open-hover-delay");
      const queryCooldownEl = document.getElementById("query-cooldown");
      const defaultActionEl = document.getElementById("default-action");
      const openTargetFolderOnSuccessEl = document.getElementById("open-target-folder-on-success");
      const launchOnStartupEl = document.getElementById("launch-on-startup");
      const hotzoneDebugLogEnabledEl = document.getElementById("hotzone-debug-log-enabled");
      const textLimitEnabledEl = document.getElementById("text-limit-enabled");
      const dragTextAppendWithNewlineEl = document.getElementById("drag-text-append-with-newline");
      const allowCrossScreenMoveEl = document.getElementById("allow-cross-screen-move");
      const hotzoneBgEnabledEl = document.getElementById("hotzone-bg-enabled");
      const hotzoneBgFillModeEl = document.getElementById("hotzone-bg-fill-mode");
      const hotzoneBgPositionEl = document.getElementById("hotzone-bg-position");
      const hotzoneBgPickEl = document.getElementById("hotzone-bg-pick");
      const hotzoneBgPathEl = document.getElementById("hotzone-bg-path");
      const hotzoneBgOpacityEl = document.getElementById("hotzone-bg-opacity");
      const hotzoneBgOpacityValueEl = document.getElementById("hotzone-bg-opacity-value");
      const hotzoneBgScaleEl = document.getElementById("hotzone-bg-scale");
      const hotzoneBgScaleValueEl = document.getElementById("hotzone-bg-scale-value");
      const panelViewModeEl = document.getElementById("panel-view-mode");
      const panelTileSizeWrapEl = document.getElementById("tile-size-wrap");
      const panelTileSizeEl = document.getElementById("panel-tile-size");
      const folderListEl = document.getElementById("folder-list");
      const folderDragReorderHintEl = document.getElementById("folder-drag-reorder-hint");
      const saveStatusEl = document.getElementById("save-status");
      const configCardEl = document.getElementById("config-card");
      const changedTips = Array.from(document.querySelectorAll(".changed-tip"));

      let config = null;
      let saveTimer = null;
      let saving = false;
      let queuedSave = false;
      let changedFields = new Set();
      let folderAddedTipTimer = null;
      let folderRemovedTipTimer = null;
      let folderDragFromIndex = null;
      let folderDragScrollTicker = null;
      let folderDragScrollDir = 0;

      const HOTZONE_FIXED = {
        edge: "top",
        widthPx: 200,
        heightPx: 300,
        xPx: null,
        yPx: 0,
        opacity: 0.08
      };

      function setStatus(message) {
        saveStatusEl.textContent = message;
      }

      function getApi() {
        if (!window.configApi || !window.configApi.isReady || !window.configApi.isReady()) {
          throw new Error(
            "配置桥接未就绪（preload 未加载）。请重启应用；若仍失败，请确认 config-preload.cjs 路径正确。"
          );
        }
        return window.configApi;
      }

      function normalizeColor(value, fallback) {
        const candidate = typeof value === "string" ? value.trim() : "";
        return /^#[0-9a-fA-F]{6}$/.test(candidate) ? candidate.toLowerCase() : fallback;
      }

      function normalizeBgFillMode(value, fallback = "cover") {
        return value === "contain" || value === "stretch" || value === "tile" ? value : fallback;
      }

      function normalizeBgPosition(value, fallback = "center center") {
        const allowed = new Set(["center center", "left center", "right center", "center top", "center bottom"]);
        return allowed.has(value) ? value : fallback;
      }

      function normalizeUnit(value, fallback) {
        const parsed = Number.parseFloat(value);
        if (!Number.isFinite(parsed)) {
          return fallback;
        }
        return Math.min(1, Math.max(0, parsed));
      }

      function normalizeBgScale(value, fallback = 1) {
        const parsed = Number.parseFloat(value);
        if (!Number.isFinite(parsed)) {
          return fallback;
        }
        return Math.min(3, Math.max(0.5, parsed));
      }

      function collectHotzoneDraft(baseHotzone = null) {
        const fallback = baseHotzone || config.hotzone || {};
        const opacityParsed = Number.parseFloat(hotzoneOpacityEl.value);
        const fallbackOpacity = Number(fallback.opacity);
        const opacity =
          Number.isFinite(opacityParsed) && opacityParsed >= 0 && opacityParsed <= 1
            ? opacityParsed
            : Number.isFinite(fallbackOpacity) && fallbackOpacity >= 0 && fallbackOpacity <= 1
              ? fallbackOpacity
              : 0.08;
        return {
          ...fallback,
          edge: "top",
          color: normalizeColor(hotzoneColorEl.value, fallback.color ?? "#467eff"),
          titleBarColor: normalizeColor(hotzoneTitlebarColorEl.value, fallback.titleBarColor ?? "#0c1220"),
          pinned: typeof fallback.pinned === "boolean" ? fallback.pinned : true,
          displayTextColor: normalizeColor(hotzoneTextColorEl.value, fallback.displayTextColor ?? "#f5f8ff"),
          displayTextBold: hotzoneTextBoldEl.checked,
          textLimitEnabled: textLimitEnabledEl.checked,
          dragTextAppendWithNewline:
            typeof fallback.dragTextAppendWithNewline === "boolean"
              ? dragTextAppendWithNewlineEl.checked
              : true,
          allowCrossScreenMove:
            typeof fallback.allowCrossScreenMove === "boolean"
              ? allowCrossScreenMoveEl.checked
              : false,
          backgroundImageEnabled: hotzoneBgEnabledEl.checked,
          backgroundImagePath: typeof hotzoneBgPathEl.value === "string" ? hotzoneBgPathEl.value.trim() : "",
          backgroundFillMode: normalizeBgFillMode(hotzoneBgFillModeEl.value, fallback.backgroundFillMode ?? "cover"),
          backgroundPosition: normalizeBgPosition(hotzoneBgPositionEl.value, fallback.backgroundPosition ?? "center center"),
          backgroundRepeat: hotzoneBgFillModeEl.value === "tile" ? "repeat" : "no-repeat",
          backgroundOpacity: Math.round(normalizeUnit(hotzoneBgOpacityEl.value, fallback.backgroundOpacity ?? 1) * 100) / 100,
          backgroundScale: Math.round(normalizeBgScale(hotzoneBgScaleEl.value, fallback.backgroundScale ?? 1) * 100) / 100,
          opacity: Math.round(opacity * 100) / 100,
          cancelRegionPx: fallback.cancelRegionPx ?? 48,
          debugVisible: fallback.debugVisible !== false
        };
      }

      function updateHotzoneOpacityLabel() {
        const parsed = Number.parseFloat(hotzoneOpacityEl.value);
        const safe = Number.isFinite(parsed) ? Math.min(1, Math.max(0, parsed)) : 0.08;
        hotzoneOpacityValueEl.textContent = safe.toFixed(2);
      }

      function updateHotzoneBgOpacityLabel() {
        hotzoneBgOpacityValueEl.textContent = normalizeUnit(hotzoneBgOpacityEl.value, 1).toFixed(2);
      }

      function updateHotzoneBgScaleLabel() {
        hotzoneBgScaleValueEl.textContent = normalizeBgScale(hotzoneBgScaleEl.value, 1).toFixed(2);
      }

      function markFieldChanged(fieldId) {
        changedFields.add(fieldId);
        const tip = changedTips.find((item) => item.dataset.tipFor === fieldId);
        if (tip) {
          tip.classList.add("visible");
        }
      }

      function clearChangedTips() {
        changedTips.forEach((tip) => {
          tip.classList.remove("visible");
        });
      }

      function openDisplayConfigModal() {
        configCardEl.classList.add("settings-focus");
        displayConfigModalEl.classList.add("show");
        openDisplayConfigEl.setAttribute("aria-pressed", "true");
        const settingsBody = displayConfigModalEl.querySelector(".settings-panel-body");
        if (settingsBody) {
          settingsBody.scrollTop = 0;
        }
      }

      function closeDisplayConfigModal() {
        configCardEl.classList.remove("settings-focus");
        displayConfigModalEl.classList.remove("show");
        openDisplayConfigEl.setAttribute("aria-pressed", "false");
        const settingsBody = displayConfigModalEl.querySelector(".settings-panel-body");
        if (settingsBody) {
          settingsBody.scrollTop = 0;
        }
      }

      function resetConfigViewOnWindowShown() {
        closeDisplayConfigModal();
        setStatus("");
        window.scrollTo(0, 0);
      }

      function showFolderAddedTip() {
        folderRemovedTipEl.classList.remove("show");
        if (folderRemovedTipTimer !== null) {
          clearTimeout(folderRemovedTipTimer);
          folderRemovedTipTimer = null;
        }
        folderAddedTipEl.classList.add("show");
        if (folderAddedTipTimer !== null) {
          clearTimeout(folderAddedTipTimer);
        }
        folderAddedTipTimer = setTimeout(() => {
          folderAddedTipEl.classList.remove("show");
          folderAddedTipTimer = null;
        }, 1200);
      }

      function showFolderRemovedTip() {
        folderAddedTipEl.classList.remove("show");
        if (folderAddedTipTimer !== null) {
          clearTimeout(folderAddedTipTimer);
          folderAddedTipTimer = null;
        }
        folderRemovedTipEl.classList.add("show");
        if (folderRemovedTipTimer !== null) {
          clearTimeout(folderRemovedTipTimer);
        }
        folderRemovedTipTimer = setTimeout(() => {
          folderRemovedTipEl.classList.remove("show");
          folderRemovedTipTimer = null;
        }, 1200);
      }

      function flashSavedTips(fields) {
        if (!Array.isArray(fields) || fields.length === 0) {
          return;
        }

        for (const fieldId of fields) {
          const tip = changedTips.find((item) => item.dataset.tipFor === fieldId);
          if (tip) {
            tip.classList.add("visible");
          }
        }

        setTimeout(() => {
          for (const fieldId of fields) {
            const tip = changedTips.find((item) => item.dataset.tipFor === fieldId);
            if (tip) {
              tip.classList.remove("visible");
            }
          }
        }, 1200);
      }

      function syncTileSizeVisibility() {
        panelTileSizeWrapEl.classList.toggle("show", panelViewModeEl.value === "tile");
      }

      function buildNextConfig(baseConfig) {
        const source = baseConfig || config;
        return {
          ...source,
          hotzone: {
            ...source.hotzone,
            ...collectHotzoneDraft(source.hotzone),
            edge: "top",
            hotzoneDebugLogEnabled: hotzoneDebugLogEnabledEl.checked
          },
          behavior: {
            ...source.behavior,
            breadcrumbSeparator: breadcrumbSeparatorEl.value === ">" ? ">" : "/",
            hoverQueryDelayMs: Math.min(2000, Math.max(100, Number.parseInt(hoverQueryDelayEl.value || "220", 10) || 220)),
            queryCooldownSec: Math.min(5, Math.max(0, Number.parseFloat(queryCooldownEl.value || "2") || 2)),
            quickOpenHoverDelayMs: Math.min(3000, Math.max(200, Number.parseInt(quickOpenHoverDelayEl.value || "500", 10) || 500)),
            pulseLevel: "high",
            defaultAction: defaultActionEl.value === "move" ? "move" : "copy",
            openTargetFolderOnDropSuccess: openTargetFolderOnSuccessEl.checked,
            launchOnStartup: launchOnStartupEl.checked,
            panelViewMode: panelViewModeEl.value === "tile" ? "tile" : "list",
            panelTileSize:
              panelTileSizeEl.value === "small"
                ? "small"
                : panelTileSizeEl.value === "medium"
                  ? "medium"
                  : "large"
          },
          folders: Array.isArray(config?.folders) ? config.folders : source.folders
        };
      }

      async function saveNow(options = {}) {
        if (!config) {
          return false;
        }

        if (saving) {
          queuedSave = true;
          return false;
        }

        const { silent = false } = options;
        const pendingChangedFields = Array.from(changedFields);
        saving = true;
        if (!silent) {
          setStatus("保存中...");
        }

        try {
          const api = getApi();
          const latest = await api.getConfig();
          const next = buildNextConfig(latest);
          const result = await Promise.race([
            api.saveConfig(next),
            new Promise((_, reject) => {
              setTimeout(() => reject(new Error("保存超时，请重试。")), 3000);
            })
          ]);

          if (!result || result.ok !== true) {
            throw new Error(result?.error || "保存失败");
          }

          config = result.data;
          changedFields = new Set();
          bindForm();
          flashSavedTips(pendingChangedFields);
          if (!silent) {
            setStatus("已保存并应用。");
          } else {
            setStatus("已写入配置。");
          }
          return true;
        } catch (error) {
          setStatus(`保存失败：${error instanceof Error ? error.message : "未知错误"}`);
          return false;
        } finally {
          saving = false;
          if (queuedSave) {
            queuedSave = false;
            void saveNow({ silent: true });
          }
        }
      }

      async function flushPendingSave(options = {}) {
        if (saveTimer !== null) {
          clearTimeout(saveTimer);
          saveTimer = null;
        }
        return saveNow(options);
      }

      function scheduleAutoSave() {
        if (saveTimer !== null) {
          clearTimeout(saveTimer);
        }
        saveTimer = setTimeout(() => {
          saveTimer = null;
          void saveNow({ silent: true });
        }, 300);
      }

      function applyHotzoneDefaults() {
        if (!config || !config.hotzone) {
          return;
        }
        config.hotzone = {
          ...config.hotzone,
          ...HOTZONE_FIXED,
          color: "#467eff",
          titleBarColor: "#0c1220",
          displayTextColor: "#f5f8ff",
          displayTextBold: false,
          allowCrossScreenMove: false,
          backgroundImageEnabled: false,
          backgroundImagePath: "",
          backgroundFillMode: "cover",
          backgroundPosition: "center center",
          backgroundRepeat: "no-repeat",
          backgroundOpacity: 1,
          backgroundScale: 1
        };
        hotzoneColorEl.value = "#467eff";
        hotzoneTitlebarColorEl.value = "#0c1220";
        hotzoneTextColorEl.value = "#f5f8ff";
        hotzoneTextBoldEl.checked = false;
        hotzoneBgEnabledEl.checked = false;
        hotzoneBgPathEl.value = "";
        hotzoneBgFillModeEl.value = "cover";
        hotzoneBgPositionEl.value = "center center";
        hotzoneBgOpacityEl.value = "1.00";
        updateHotzoneBgOpacityLabel();
        hotzoneBgScaleEl.value = "1.00";
        updateHotzoneBgScaleLabel();
        hotzoneOpacityEl.value = HOTZONE_FIXED.opacity.toFixed(2);
        updateHotzoneOpacityLabel();
      }

      function createFolderId() {
        return `folder-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
      }

      function middleEllipsis(value, max = 72) {
        if (typeof value !== "string" || value.length <= max) {
          return value;
        }
        const head = Math.floor((max - 3) / 2);
        const tail = max - 3 - head;
        return `${value.slice(0, head)}...${value.slice(value.length - tail)}`;
      }

      function clearFolderDropIndicators() {
        folderListEl.querySelectorAll(".folder-item").forEach((el) => {
          el.classList.remove("folder-drag-over-before", "folder-drag-over-after");
        });
      }

      function stopFolderDragScrollTicker() {
        if (folderDragScrollTicker !== null) {
          clearInterval(folderDragScrollTicker);
          folderDragScrollTicker = null;
        }
        folderDragScrollDir = 0;
      }

      function syncFolderDragScroll(clientX, clientY) {
        const el = folderListEl;
        if (!el || folderDragFromIndex === null) {
          stopFolderDragScrollTicker();
          return;
        }
        const rect = el.getBoundingClientRect();
        const edge = 48;
        const inHoriz = clientX >= rect.left - 36 && clientX <= rect.right + 36;
        if (!inHoriz || clientY < rect.top || clientY > rect.bottom) {
          stopFolderDragScrollTicker();
          return;
        }
        let dir = 0;
        if (clientY < rect.top + edge && el.scrollTop > 0) {
          dir = -1;
        } else if (clientY > rect.bottom - edge && el.scrollTop + el.clientHeight < el.scrollHeight - 2) {
          dir = 1;
        }
        if (dir === 0) {
          stopFolderDragScrollTicker();
          return;
        }
        if (folderDragScrollTicker !== null && folderDragScrollDir === dir) {
          return;
        }
        stopFolderDragScrollTicker();
        folderDragScrollDir = dir;
        folderDragScrollTicker = setInterval(() => {
          el.scrollBy({ top: folderDragScrollDir * 12, behavior: "auto" });
          if (
            (folderDragScrollDir < 0 && el.scrollTop <= 0) ||
            (folderDragScrollDir > 0 && el.scrollTop + el.clientHeight >= el.scrollHeight - 2)
          ) {
            stopFolderDragScrollTicker();
          }
        }, 45);
      }

      function updateFolderDragReorderHint() {
        if (!folderDragReorderHintEl) {
          return;
        }
        if (folderDragFromIndex === null) {
          folderDragReorderHintEl.hidden = true;
          folderDragReorderHintEl.setAttribute("aria-hidden", "true");
          const wrap = folderListEl.parentElement;
          if (wrap && wrap.classList.contains("folder-list-wrap")) {
            wrap.classList.remove("folder-drag-hint-visible");
          }
          return;
        }
        const scrollable = folderListEl.scrollHeight > folderListEl.clientHeight + 2;
        folderDragReorderHintEl.hidden = !scrollable;
        folderDragReorderHintEl.setAttribute("aria-hidden", scrollable ? "false" : "true");
        const wrap = folderListEl.parentElement;
        if (wrap && wrap.classList.contains("folder-list-wrap")) {
          wrap.classList.toggle("folder-drag-hint-visible", scrollable);
        }
      }

      function clearFolderDragState() {
        stopFolderDragScrollTicker();
        folderListEl.querySelectorAll(".folder-item").forEach((el) => {
          el.classList.remove(
            "folder-drag-over-before",
            "folder-drag-over-after",
            "folder-item-dragging"
          );
        });
        updateFolderDragReorderHint();
      }

      function getFolderInsertBeforeIndexFromClientY(clientY) {
        const items = [...folderListEl.querySelectorAll(".folder-item")];
        for (let i = 0; i < items.length; i++) {
          const r = items[i].getBoundingClientRect();
          if (clientY < r.top + r.height / 2) {
            return i;
          }
        }
        return items.length;
      }

      function applyFolderReorderByInsertBefore(fromIndex, insertBeforeIndex) {
        const list = config.folders;
        if (
          insertBeforeIndex < 0 ||
          insertBeforeIndex > list.length ||
          fromIndex === insertBeforeIndex ||
          fromIndex + 1 === insertBeforeIndex
        ) {
          return false;
        }
        const [moved] = list.splice(fromIndex, 1);
        let to = insertBeforeIndex;
        if (fromIndex < insertBeforeIndex) {
          to -= 1;
        }
        list.splice(to, 0, moved);
        return true;
      }

      folderListEl.addEventListener("dragover", (e) => {
        if (folderDragFromIndex === null) {
          return;
        }
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        syncFolderDragScroll(e.clientX, e.clientY);
        clearFolderDropIndicators();
        const rows = folderListEl.querySelectorAll(".folder-item");
        const src = rows[folderDragFromIndex];
        if (src) {
          src.classList.add("folder-item-dragging");
        }
        const items = [...rows];
        for (let i = 0; i < items.length; i++) {
          const r = items[i].getBoundingClientRect();
          if (e.clientY < r.top + r.height / 2) {
            items[i].classList.add("folder-drag-over-before");
            return;
          }
        }
        if (items.length > 0) {
          items[items.length - 1].classList.add("folder-drag-over-after");
        }
      });

      folderListEl.addEventListener("drop", (e) => {
        if (folderDragFromIndex === null) {
          return;
        }
        e.preventDefault();
        const insertBefore = getFolderInsertBeforeIndexFromClientY(e.clientY);
        const from = folderDragFromIndex;
        folderDragFromIndex = null;
        clearFolderDragState();
        if (applyFolderReorderByInsertBefore(from, insertBefore)) {
          markFieldChanged("folders-list");
          renderFolders();
          scheduleAutoSave();
        }
      });

      folderListEl.addEventListener("dragleave", (e) => {
        if (folderDragFromIndex === null) {
          return;
        }
        if (!folderListEl.contains(e.relatedTarget)) {
          clearFolderDropIndicators();
          const rows = folderListEl.querySelectorAll(".folder-item");
          const src = rows[folderDragFromIndex];
          if (src) {
            src.classList.add("folder-item-dragging");
          }
        }
      });

      document.addEventListener(
        "dragover",
        (e) => {
          if (folderDragFromIndex === null) {
            return;
          }
          syncFolderDragScroll(e.clientX, e.clientY);
        },
        true
      );

      function renderFolders() {
        folderListEl.innerHTML = "";
        if (!config.folders || config.folders.length === 0) {
          const empty = document.createElement("div");
          empty.className = "muted";
          empty.textContent = "还未添加常用文件夹";
          folderListEl.appendChild(empty);
          return;
        }

        config.folders.forEach((folder, index) => {
          const item = document.createElement("div");
          item.className = "folder-item";

          const handle = document.createElement("span");
          handle.className = "folder-drag-handle";
          handle.textContent = "⋮⋮";
          handle.title = "拖动调整顺序";
          handle.setAttribute("draggable", "true");
          handle.addEventListener("dragstart", (e) => {
            folderDragFromIndex = index;
            item.classList.add("folder-item-dragging");
            e.dataTransfer.effectAllowed = "move";
            e.dataTransfer.setData("text/plain", String(index));
            updateFolderDragReorderHint();
          });
          handle.addEventListener("dragend", () => {
            folderDragFromIndex = null;
            clearFolderDragState();
          });

          const main = document.createElement("div");
          main.className = "folder-main";

          const name = document.createElement("div");
          name.className = "folder-name";
          const labelText = `${index + 1}. ${folder.name}`;
          name.textContent = labelText;
          name.title = labelText;

          const path = document.createElement("div");
          path.className = "folder-path-inline";
          const pathText = typeof folder.path === "string" ? folder.path : "";
          path.textContent = pathText;
          path.title = pathText;

          main.append(name, path);

          const actions = document.createElement("div");
          actions.className = "actions";

          const up = document.createElement("button");
          up.type = "button";
          up.textContent = "↑";
          up.className = "icon-btn";
          up.title = "上移";
          up.disabled = index === 0;
          up.addEventListener("click", () => {
            const temp = config.folders[index - 1];
            config.folders[index - 1] = config.folders[index];
            config.folders[index] = temp;
            markFieldChanged("folders-list");
            renderFolders();
            scheduleAutoSave();
          });

          const down = document.createElement("button");
          down.type = "button";
          down.textContent = "↓";
          down.className = "icon-btn";
          down.title = "下移";
          down.disabled = index === config.folders.length - 1;
          down.addEventListener("click", () => {
            const temp = config.folders[index + 1];
            config.folders[index + 1] = config.folders[index];
            config.folders[index] = temp;
            markFieldChanged("folders-list");
            renderFolders();
            scheduleAutoSave();
          });

          const replace = document.createElement("button");
          replace.type = "button";
          replace.textContent = "↺";
          replace.className = "icon-btn";
          replace.title = "更改文件夹";
          replace.addEventListener("click", async () => {
            try {
              const api = getApi();
              const newPath = await api.pickFolder();
              if (!newPath) {
                return;
              }

              const duplicated = config.folders.some((item, idx) => idx !== index && item.path === newPath);
              if (duplicated) {
                setStatus("该文件夹已存在于常用列表。请重新选择。");
                return;
              }

              const newName = newPath.split(/[/\\]/).filter(Boolean).pop() || newPath;
              config.folders[index] = {
                ...config.folders[index],
                name: newName,
                path: newPath
              };
              markFieldChanged("folders-list");
              renderFolders();
              setStatus("已更新文件夹路径。正在自动保存...");
              scheduleAutoSave();
            } catch (error) {
              setStatus(`更新文件夹失败：${error instanceof Error ? error.message : "未知错误"}`);
            }
          });

          const remove = document.createElement("button");
          remove.type = "button";
          remove.textContent = "×";
          remove.className = "icon-btn";
          remove.title = "删除";
          remove.addEventListener("click", () => {
            config.folders.splice(index, 1);
            renderFolders();
            showFolderRemovedTip();
            scheduleAutoSave();
          });

          actions.append(up, down, replace, remove);
          item.append(handle, main, actions);
          folderListEl.appendChild(item);
        });
      }

      function bindForm() {
        hotzoneColorEl.value = normalizeColor(config.hotzone.color, "#467eff");
        hotzoneTitlebarColorEl.value = normalizeColor(config.hotzone.titleBarColor, "#0c1220");
        hotzoneTextColorEl.value = normalizeColor(config.hotzone.displayTextColor, "#f5f8ff");
        hotzoneTextBoldEl.checked = config.hotzone.displayTextBold === true;
        hotzoneOpacityEl.value = Number(config.hotzone.opacity ?? 0.08).toFixed(2);
        updateHotzoneOpacityLabel();
        breadcrumbSeparatorEl.value = config.behavior?.breadcrumbSeparator ?? "/";
        hoverQueryDelayEl.value = Math.max(100, Math.min(2000, Number(config.behavior?.hoverQueryDelayMs ?? 220) || 220));
        queryCooldownEl.value = Number(config.behavior?.queryCooldownSec ?? 2).toFixed(2);
        quickOpenHoverDelayEl.value = Math.max(200, Math.min(3000, Number(config.behavior?.quickOpenHoverDelayMs ?? 500) || 500));
        defaultActionEl.value = config.behavior?.defaultAction === "move" ? "move" : "copy";
        openTargetFolderOnSuccessEl.checked = config.behavior?.openTargetFolderOnDropSuccess === true;
        launchOnStartupEl.checked = config.behavior?.launchOnStartup === true;
        hotzoneDebugLogEnabledEl.checked = config.hotzone?.hotzoneDebugLogEnabled === true;
        textLimitEnabledEl.checked = config.hotzone?.textLimitEnabled !== false;
        dragTextAppendWithNewlineEl.checked = config.hotzone?.dragTextAppendWithNewline !== false;
        allowCrossScreenMoveEl.checked = config.hotzone?.allowCrossScreenMove === true;
        hotzoneBgEnabledEl.checked = config.hotzone?.backgroundImageEnabled === true;
        hotzoneBgPathEl.value = typeof config.hotzone?.backgroundImagePath === "string" ? config.hotzone.backgroundImagePath : "";
        hotzoneBgFillModeEl.value = normalizeBgFillMode(config.hotzone?.backgroundFillMode, "cover");
        hotzoneBgPositionEl.value = normalizeBgPosition(config.hotzone?.backgroundPosition, "center center");
        hotzoneBgOpacityEl.value = normalizeUnit(config.hotzone?.backgroundOpacity, 1).toFixed(2);
        updateHotzoneBgOpacityLabel();
        hotzoneBgScaleEl.value = normalizeBgScale(config.hotzone?.backgroundScale, 1).toFixed(2);
        updateHotzoneBgScaleLabel();
        panelViewModeEl.value =
          config.behavior?.panelViewMode === "tile"
            ? "tile"
            : "list";
        panelTileSizeEl.value =
          config.behavior?.panelTileSize === "small"
            ? "small"
            : config.behavior?.panelTileSize === "medium"
              ? "medium"
              : "large";
        syncTileSizeVisibility();
        renderFolders();
      }

      [
        hotzoneColorEl,
        hotzoneTitlebarColorEl,
        hotzoneTextColorEl,
        hotzoneTextBoldEl,
        hotzoneOpacityEl,
        breadcrumbSeparatorEl,
        hoverQueryDelayEl,
        queryCooldownEl,
        quickOpenHoverDelayEl,
        defaultActionEl,
        openTargetFolderOnSuccessEl,
        launchOnStartupEl,
        hotzoneDebugLogEnabledEl,
        textLimitEnabledEl,
        dragTextAppendWithNewlineEl,
        allowCrossScreenMoveEl,
        hotzoneBgEnabledEl,
        hotzoneBgFillModeEl,
        hotzoneBgPositionEl,
        hotzoneBgPathEl,
        hotzoneBgOpacityEl,
        hotzoneBgScaleEl,
        panelViewModeEl,
        panelTileSizeEl
      ].forEach((el) => {
        el.addEventListener("input", () => {
          markFieldChanged(el.id);
          if (el === hotzoneOpacityEl) {
            updateHotzoneOpacityLabel();
          }
          if (el === panelViewModeEl) {
            syncTileSizeVisibility();
          }
          if (el === hotzoneBgOpacityEl) {
            updateHotzoneBgOpacityLabel();
          }
          if (el === hotzoneBgScaleEl) {
            updateHotzoneBgScaleLabel();
          }
          scheduleAutoSave();
        });
        el.addEventListener("change", () => {
          markFieldChanged(el.id);
          if (el === hotzoneOpacityEl) {
            updateHotzoneOpacityLabel();
          }
          if (el === panelViewModeEl) {
            syncTileSizeVisibility();
          }
          if (el === hotzoneBgOpacityEl) {
            updateHotzoneBgOpacityLabel();
          }
          if (el === hotzoneBgScaleEl) {
            updateHotzoneBgScaleLabel();
          }
          if (el === defaultActionEl || el === launchOnStartupEl || el === hotzoneDebugLogEnabledEl) {
            void flushPendingSave({ silent: true });
          } else {
            scheduleAutoSave();
          }
        });
      });

      resetHotzoneEl.addEventListener("click", () => {
        applyHotzoneDefaults();
        markFieldChanged("hotzone-color");
        markFieldChanged("hotzone-titlebar-color");
        markFieldChanged("hotzone-text-color");
        markFieldChanged("hotzone-text-bold");
        markFieldChanged("hotzone-opacity");
        markFieldChanged("allow-cross-screen-move");
        markFieldChanged("hotzone-bg-enabled");
        markFieldChanged("hotzone-bg-fill-mode");
        markFieldChanged("hotzone-bg-position");
        markFieldChanged("hotzone-bg-path");
        markFieldChanged("hotzone-bg-opacity");
        markFieldChanged("hotzone-bg-scale");
        scheduleAutoSave();
        setStatus("已恢复固定触发方式默认热区。正在自动保存...");
      });

      hotzoneBgPickEl.addEventListener("click", async () => {
        try {
          const api = getApi();
          const picked = await api.pickHotzoneImage();
          if (!picked) {
            return;
          }
          hotzoneBgPathEl.value = picked;
          markFieldChanged("hotzone-bg-path");
          scheduleAutoSave();
          setStatus("背景图已导入应用背景库，正在自动保存...");
        } catch (error) {
          setStatus(`选择背景图失败：${error instanceof Error ? error.message : "未知错误"}`);
        }
      });

      addFolderEl.addEventListener("click", async () => {
        try {
          const api = getApi();
          const path = await api.pickFolder();
          if (!path) {
            setStatus("已取消选择文件夹。");
            return;
          }

          const existing = config.folders.find((item) => item.path === path);
          if (existing) {
            setStatus("该文件夹已存在于常用列表。");
            return;
          }

          const name = path.split(/[/\\]/).filter(Boolean).pop() || path;
          config.folders.push({
            id: createFolderId(),
            name,
            path
          });
          renderFolders();
          showFolderAddedTip();
          setStatus("已添加文件夹。正在自动保存...");
          scheduleAutoSave();
          } catch (error) {
            setStatus(`添加文件夹失败：${error instanceof Error ? error.message : "未知错误"}`);
          }
        });

      openDisplayConfigEl.addEventListener("click", () => {
        if (displayConfigModalEl.classList.contains("show")) {
          closeDisplayConfigModal();
          return;
        }
        openDisplayConfigModal();
      });

      saveDisplayConfigEl.addEventListener("click", async () => {
        const ok = await flushPendingSave({ silent: false });
        if (ok) {
          closeDisplayConfigModal();
        }
      });

      try {
        const api = getApi();
        if (typeof api.onWindowShown === "function") {
          api.onWindowShown(() => {
            resetConfigViewOnWindowShown();
          });
        }
        config = await api.getConfig();
        clearChangedTips();
        bindForm();
      } catch (error) {
        setStatus(`配置初始化失败：${error instanceof Error ? error.message : "未知错误"}`);
      }
    </script>
  </body>
</html>
