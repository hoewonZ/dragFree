<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dragFree Overlay</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }

      #hotzone {
        position: absolute;
        left: 0;
        right: 0;
        top: var(--header-height, 28px);
        bottom: 0;
        height: calc(100% - var(--header-height, 28px));
        border-radius: 0 0 8px 8px;
        background: rgba(70, 126, 255, 0.08);
        border-left: 1px solid var(--hotzone-frame-color, rgba(255, 255, 255, 0.22));
        border-right: 1px solid var(--hotzone-frame-color, rgba(255, 255, 255, 0.22));
        border-bottom: 1px solid var(--hotzone-frame-color, rgba(255, 255, 255, 0.22));
        border-top: none;
        box-sizing: border-box;
      }

      #hotzone-titlebar {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: var(--header-height, 28px);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0 8px;
        box-sizing: border-box;
        z-index: 12;
        pointer-events: auto;
        border-radius: 8px 8px 0 0;
        border: 1px solid var(--hotzone-frame-color, rgba(255, 255, 255, 0.22));
        border-bottom: 1px solid var(--hotzone-divider-color, rgba(255, 255, 255, 0.22));
        background: rgba(12, 18, 32, 0.24);
        cursor: move;
      }

      #mode-toggle {
        position: absolute;
        left: 8px;
        top: 8px;
        z-index: 9;
        border: none;
        border-radius: 999px;
        background: transparent;
        color: #f5f8ff;
        font-size: 15px;
        line-height: 1;
        padding: 4px;
        cursor: pointer;
        user-select: none;
        box-shadow: none;
      }

      #mode-toggle[data-editing="true"] {
        background: rgba(27, 58, 28, 0.72);
        border: 1px solid rgba(201, 255, 205, 0.5);
        padding: 5px 8px;
      }

      #debug {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(12, 18, 32, 0.58);
        color: #eef3ff;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        pointer-events: none;
        white-space: nowrap;
        max-width: calc(100% - 24px);
        overflow: hidden;
        text-overflow: ellipsis;
      }


      #editor-layer {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 0.12s ease;
        pointer-events: none;
      }

      .resize-hit {
        position: absolute;
        z-index: 4;
        background: transparent;
        pointer-events: auto;
      }

      .resize-hit[data-resize="n"] {
        left: 16px;
        right: 16px;
        top: 0;
        height: 16px;
        cursor: ns-resize;
      }

      .resize-hit[data-resize="s"] {
        left: 16px;
        right: 16px;
        bottom: 0;
        height: 16px;
        cursor: ns-resize;
      }

      .resize-hit[data-resize="w"] {
        left: 0;
        top: 16px;
        bottom: 16px;
        width: 16px;
        cursor: ew-resize;
      }

      .resize-hit[data-resize="e"] {
        right: 0;
        top: 16px;
        bottom: 16px;
        width: 16px;
        cursor: ew-resize;
      }

      .resize-hit[data-resize="nw"] {
        left: 0;
        top: 0;
        width: 22px;
        height: 22px;
        cursor: nwse-resize;
      }

      .resize-hit[data-resize="ne"] {
        right: 0;
        top: 0;
        width: 22px;
        height: 22px;
        cursor: nesw-resize;
      }

      .resize-hit[data-resize="sw"] {
        left: 0;
        bottom: 0;
        width: 22px;
        height: 22px;
        cursor: nesw-resize;
      }

      .resize-hit[data-resize="se"] {
        right: 0;
        bottom: 0;
        width: 22px;
        height: 22px;
        cursor: nwse-resize;
      }

      body.editable #editor-layer,
      body.interacting #editor-layer {
        opacity: 1;
        pointer-events: auto;
      }

      #move-hit {
        position: absolute;
        inset: 0;
        border-radius: 6px;
        cursor: default;
        z-index: 3;
        pointer-events: none;
      }

      body.editable #move-hit,
      body.interacting #move-hit {
        background: rgba(255, 255, 255, 0.03);
      }

    </style>
  </head>
  <body>
    <div id="hotzone-titlebar"></div>
    <div id="hotzone">
      <button id="mode-toggle" type="button" data-editing="false" aria-label="切换编辑模式">🔒 锁定</button>
      <div id="editor-layer">
        <div id="move-hit"></div>
        <div class="resize-hit" data-resize="n"></div>
        <div class="resize-hit" data-resize="s"></div>
        <div class="resize-hit" data-resize="w"></div>
        <div class="resize-hit" data-resize="e"></div>
        <div class="resize-hit" data-resize="nw"></div>
        <div class="resize-hit" data-resize="ne"></div>
        <div class="resize-hit" data-resize="sw"></div>
        <div class="resize-hit" data-resize="se"></div>
      </div>
      <div id="debug">拖动文件到这里</div>
    </div>
    <script src="./hotzone-display-editor.js"></script>
    <script>
      const hotzone = document.getElementById("hotzone");
      const titlebar = document.getElementById("hotzone-titlebar");
      const modeToggle = document.getElementById("mode-toggle");
      const debug = document.getElementById("debug");
      const moveHit = document.getElementById("move-hit");

      const MIN_WIDTH = 120;
      const MIN_HEIGHT = 96;

      let displayBounds = { x: 0, y: 0, width: 1920, height: 1080 };
      let virtualBounds = { x: 0, y: 0, width: 1920, height: 1080 };
      let overlayBounds = { x: 0, y: 0, width: 1920, height: 1080 };
      let headerHeight = 28;
      let collapsed = false;
      let minWidthPx = MIN_WIDTH;
      let minHeightPx = MIN_HEIGHT;
      let hotzoneState = {
        edge: "top",
        displayId: null,
        widthPx: 200,
        heightPx: 300,
        xPx: null,
        yPx: 0,
        opacity: 0.08,
        color: "#467eff",
        titleBarColor: "#0c1220",
        displayText: "拖动文件到这里，或双击这里试试",
        displayTextColor: "#f5f8ff",
        displayTextBold: false,
        displayTextSizeLevel: 0,
        cancelRegionPx: 48,
        debugVisible: true
      };

      let interaction = null;
      let isFileDragging = false;
      let capturedPointerTarget = null;
      let isEditing = false;
      let hasLoggedInvisibleDuringEditing = false;
      const displayEditor = window.createHotzoneDisplayEditor({
        hotzoneEl: hotzone,
        titlebarEl: titlebar,
        displayEl: debug,
        minWidth: MIN_WIDTH,
        minHeight: MIN_HEIGHT,
        overlayApi: window.overlayApi,
        onSave: async (nextText) => {
          const result = await window.overlayApi.commitHotzone({ displayText: nextText });
          if (result?.ok && result.hotzone) {
            hotzoneState = sanitizeHotzone(result.hotzone);
            applyHotzoneVisual();
            displayEditor.update({
              text: hotzoneState.displayText,
              locked: true,
              enabled: hotzoneState.debugVisible,
              widthPx: hotzoneState.widthPx,
              heightPx: hotzoneState.heightPx,
              color: hotzoneState.color,
              textColor: hotzoneState.displayTextColor,
              textBold: hotzoneState.displayTextBold,
              textSizeLevel: hotzoneState.displayTextSizeLevel
            });
            return { ok: true, text: hotzoneState.displayText };
          }

          return { ok: false };
        }
      });

      function isEditorEnabled() {
        return hotzoneState.debugVisible && !isFileDragging;
      }

      function updateModeToggle() {
        modeToggle.dataset.editing = "false";
        modeToggle.textContent = "⇕ 调整";
      }

      function updateEditorVisibility() {
        if (interaction) {
          document.body.classList.add("interacting");
        } else {
          document.body.classList.remove("interacting");
        }

        if (isEditorEnabled() && !collapsed) {
          document.body.classList.add("editable");
        } else {
          document.body.classList.remove("editable");
        }
      }

      function getDraggedPaths(dataTransfer) {
        const files = Array.from(dataTransfer?.files ?? []);
        return files
          .map((file) => window.overlayApi.getPathForFile(file))
          .filter((value) => typeof value === "string" && value.length > 0);
      }

      function detectFileDrag(dataTransfer) {
        const types = Array.from(dataTransfer?.types ?? []);
        return types.includes("Files");
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function sanitizeHotzone(state) {
        const maxWidth = Math.max(1, displayBounds.width);
        const maxHeight = Math.max(1, displayBounds.height);
        const widthPx = Math.min(maxWidth, Math.max(minWidthPx, Math.round(Number(state.widthPx) || 200)));
        const heightPx = Math.min(maxHeight, Math.max(minHeightPx, Math.round(Number(state.heightPx) || 300)));
        const centeredX = Math.round(displayBounds.x + (displayBounds.width - widthPx) / 2);
        const rawX = state.xPx === null || state.xPx === undefined ? centeredX : Math.round(Number(state.xPx));
        const rawY = Number.isFinite(Number(state.yPx)) ? Math.round(Number(state.yPx)) : displayBounds.y;

        const xClampMin = displayBounds.x;
        const xClampMax = displayBounds.x + displayBounds.width - widthPx;
        const yClampMin = displayBounds.y;
        const yClampMax = displayBounds.y + displayBounds.height - heightPx;

        const xPx = clamp(rawX, xClampMin, xClampMax);
        const yPx = clamp(rawY, yClampMin, yClampMax);
        const opacity = clamp(Number(state.opacity) || 0.08, 0, 1);
        const color =
          typeof state.color === "string" && /^#[0-9a-fA-F]{6}$/.test(state.color)
            ? state.color.toLowerCase()
            : "#467eff";
        const titleBarColor =
          typeof state.titleBarColor === "string" && /^#[0-9a-fA-F]{6}$/.test(state.titleBarColor)
            ? state.titleBarColor.toLowerCase()
            : "#0c1220";
        const rawTextSizeLevel = Number(state.displayTextSizeLevel);
        const displayTextSizeLevel = Number.isFinite(rawTextSizeLevel)
          ? clamp(Math.round(rawTextSizeLevel), 0, 9)
          : 0;

        return {
          ...state,
          edge: "top",
          widthPx,
          heightPx,
          xPx,
          yPx,
          opacity: Math.round(opacity * 100) / 100,
          color,
          titleBarColor,
          displayTextSizeLevel
        };
      }

      function applyHotzoneGeometry() {
        const localX = isEditing ? hotzoneState.xPx - overlayBounds.x : 0;
        const localY = isEditing ? hotzoneState.yPx - overlayBounds.y - headerHeight : headerHeight;
        const renderWidth = isEditing ? hotzoneState.widthPx : overlayBounds.width;
        const renderHeight = isEditing ? hotzoneState.heightPx : Math.max(1, overlayBounds.height - headerHeight);
        const localRight = localX + renderWidth;
        const localBottom = localY + renderHeight;
        const isOutsideOverlay =
          localRight < 0 ||
          localBottom < 0 ||
          localX > overlayBounds.width ||
          localY > overlayBounds.height;

        if (isEditing && isOutsideOverlay && !hasLoggedInvisibleDuringEditing) {
          hasLoggedInvisibleDuringEditing = true;
          window.overlayApi.emitDebugSnapshot({
            type: "invisible_detected",
            editMode: isEditing,
            hotzone: {
              xPx: hotzoneState.xPx,
              yPx: hotzoneState.yPx,
              widthPx: hotzoneState.widthPx,
              heightPx: hotzoneState.heightPx,
              displayId: hotzoneState.displayId,
              opacity: hotzoneState.opacity
            },
            overlayBounds,
            displayBounds,
            virtualBounds,
            localRect: {
              x: Math.round(localX),
              y: Math.round(localY),
              right: Math.round(localRight),
              bottom: Math.round(localBottom)
            }
          });
        }

        if (!isOutsideOverlay) {
          hasLoggedInvisibleDuringEditing = false;
        }

        hotzone.style.left = `${Math.round(localX)}px`;
        hotzone.style.top = `${Math.round(localY)}px`;
        hotzone.style.width = `${Math.max(1, Math.round(renderWidth))}px`;
        hotzone.style.height = `${Math.max(1, Math.round(renderHeight))}px`;
      }

      function hexToRgba(hex, alpha) {
        const normalized = typeof hex === "string" ? hex.trim().replace("#", "") : "467eff";
        const safe = /^[0-9a-fA-F]{6}$/.test(normalized) ? normalized : "467eff";
        const r = Number.parseInt(safe.slice(0, 2), 16);
        const g = Number.parseInt(safe.slice(2, 4), 16);
        const b = Number.parseInt(safe.slice(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${clamp(alpha, 0, 1)})`;
      }

      function applyHotzoneVisual() {
        applyHotzoneGeometry();
        hotzone.style.backgroundColor = hexToRgba(hotzoneState.color, hotzoneState.opacity);
        const titleAlpha = clamp(hotzoneState.opacity, 0.05, 0.92);
        const borderAlpha = clamp(hotzoneState.opacity + 0.24, 0.12, 1);
        const dividerAlpha = clamp(hotzoneState.opacity + 0.16, 0.1, 0.9);
        titlebar.style.backgroundColor = hexToRgba(hotzoneState.titleBarColor, titleAlpha);
        const frameColor = hexToRgba(hotzoneState.titleBarColor, borderAlpha);
        const dividerColor = hexToRgba(hotzoneState.titleBarColor, dividerAlpha);
        titlebar.style.borderColor = frameColor;
        titlebar.style.borderBottomColor = dividerColor;
        hotzone.style.setProperty("--hotzone-frame-color", frameColor);
        hotzone.style.setProperty("--hotzone-divider-color", dividerColor);
        hotzone.style.display = collapsed ? "none" : "block";
      }

      function emitPreview() {
        window.overlayApi.emitHotzonePreview(hotzoneState);
      }

      function emitInteractionSnapshot(endedInteraction) {
        if (!endedInteraction) {
          return;
        }

        window.overlayApi.emitDebugSnapshot({
          type: "interaction_end",
          action: endedInteraction.type,
          mode: endedInteraction.mode ?? null,
          editMode: isEditing,
          hotzone: {
            xPx: hotzoneState.xPx,
            yPx: hotzoneState.yPx,
            widthPx: hotzoneState.widthPx,
            heightPx: hotzoneState.heightPx,
            displayId: hotzoneState.displayId,
            opacity: hotzoneState.opacity
          },
          overlayBounds,
          displayBounds,
          virtualBounds
        });
      }

      function beginInteraction(type, event, extra = {}) {
        if (!isEditorEnabled()) {
          return;
        }
        isFileDragging = false;
        interaction = {
          type,
          startScreenX: event.screenX,
          startScreenY: event.screenY,
          pointerId: event.pointerId,
          start: { ...hotzoneState },
          ...extra
        };

        if (event.currentTarget && typeof event.currentTarget.setPointerCapture === "function") {
          try {
            event.currentTarget.setPointerCapture(event.pointerId);
            capturedPointerTarget = event.currentTarget;
          } catch {
            capturedPointerTarget = null;
          }
        }

        updateEditorVisibility();
      }

      function releaseCapturedPointer() {
        if (!interaction || !capturedPointerTarget) {
          capturedPointerTarget = null;
          return;
        }

        if (
          typeof capturedPointerTarget.hasPointerCapture === "function" &&
          typeof capturedPointerTarget.releasePointerCapture === "function" &&
          capturedPointerTarget.hasPointerCapture(interaction.pointerId)
        ) {
          try {
            capturedPointerTarget.releasePointerCapture(interaction.pointerId);
          } catch {
            // Ignore release errors from stale pointer targets.
          }
        }

        capturedPointerTarget = null;
      }

      function applyMove(dx, dy) {
        const next = {
          ...interaction.start,
          xPx: (interaction.start.xPx ?? 0) + dx,
          yPx: interaction.start.yPx + dy
        };
        hotzoneState = sanitizeHotzone(next);
        applyHotzoneVisual();
        emitPreview();
      }

      function applyResize(mode, dx, dy) {
        const startX = interaction.start.xPx ?? 0;
        const startY = interaction.start.yPx;
        let left = startX;
        let right = startX + interaction.start.widthPx;
        let top = startY;
        let bottom = startY + interaction.start.heightPx;

        if (mode.includes("w")) {
          left = startX + dx;
        }
        if (mode.includes("e")) {
          right = startX + interaction.start.widthPx + dx;
        }
        if (mode.includes("n")) {
          top = startY + dy;
        }
        if (mode.includes("s")) {
          bottom = startY + interaction.start.heightPx + dy;
        }

        if (right - left < minWidthPx) {
          if (mode.includes("w") && !mode.includes("e")) {
            left = right - minWidthPx;
          } else {
            right = left + minWidthPx;
          }
        }

        if (bottom - top < minHeightPx) {
          if (mode.includes("n") && !mode.includes("s")) {
            top = bottom - minHeightPx;
          } else {
            bottom = top + minHeightPx;
          }
        }

        const next = {
          ...interaction.start,
          xPx: left,
          yPx: top,
          widthPx: right - left,
          heightPx: bottom - top
        };

        hotzoneState = sanitizeHotzone(next);
        applyHotzoneVisual();
        emitPreview();
      }

      document.addEventListener("pointermove", (event) => {
        if (!interaction) {
          return;
        }

        const dx = Math.round(event.screenX - interaction.startScreenX);
        const dy = Math.round(event.screenY - interaction.startScreenY);

        if (interaction.type === "move") {
          applyMove(dx, dy);
          return;
        }

        if (interaction.type === "resize") {
          applyResize(interaction.mode, dx, dy);
        }

      });

      document.addEventListener("pointerup", async () => {
        if (!interaction) {
          return;
        }
        const endedInteraction = { ...interaction };
        releaseCapturedPointer();
        interaction = null;
        updateEditorVisibility();
        emitInteractionSnapshot(endedInteraction);
      });

      document.addEventListener("pointercancel", () => {
        if (!interaction) {
          return;
        }
        releaseCapturedPointer();
        interaction = null;
        updateEditorVisibility();
      });

      titlebar.addEventListener("pointerdown", (event) => {
        if (!isEditorEnabled()) {
          return;
        }
        if (event.target.closest("[data-no-drag]")) {
          return;
        }
        event.preventDefault();
        beginInteraction("move", event);
      });

      for (const handle of document.querySelectorAll("[data-resize]")) {
        handle.addEventListener("pointerdown", (event) => {
          if (collapsed) {
            return;
          }
          if (!isEditorEnabled()) {
            return;
          }
          event.preventDefault();
          event.stopPropagation();
          beginInteraction("resize", event, {
            mode: handle.dataset.resize
          });
        });
      }

      modeToggle.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
      });

      window.overlayApi.onConfig((payload) => {
        displayBounds = payload.displayBounds ?? displayBounds;
        virtualBounds = payload.virtualBounds ?? virtualBounds;
        overlayBounds = payload.overlayBounds ?? overlayBounds;
        headerHeight = Math.max(0, Math.round(Number(payload.headerHeight) || 0));
        collapsed = payload.collapsed === true;
        minWidthPx = Math.max(MIN_WIDTH, Math.round(Number(payload.minWidthPx) || MIN_WIDTH));
        minHeightPx = Math.max(MIN_HEIGHT, Math.round(Number(payload.minHeightPx) || MIN_HEIGHT));
        hotzone.style.top = `${headerHeight}px`;
        hotzone.style.height = `${Math.max(1, overlayBounds.height - headerHeight)}px`;
        document.documentElement.style.setProperty("--header-height", `${headerHeight}px`);
        isEditing = false;
        hotzoneState = sanitizeHotzone(payload.hotzone ?? hotzoneState);
        window.overlayApi.emitDebugSnapshot({
          type: "overlay_config_applied",
          editMode: isEditing,
          hotzone: {
            xPx: hotzoneState.xPx,
            yPx: hotzoneState.yPx,
            widthPx: hotzoneState.widthPx,
            heightPx: hotzoneState.heightPx,
            displayId: hotzoneState.displayId,
            opacity: hotzoneState.opacity
          },
          overlayBounds,
          displayBounds,
          virtualBounds
        });

        if (hotzoneState.debugVisible) {
          applyHotzoneVisual();
          hotzone.style.pointerEvents = "auto";
          modeToggle.style.display = "none";
        } else {
          hotzone.style.background = "transparent";
          document.body.classList.remove("editable");
          hotzone.style.pointerEvents = "auto";
          modeToggle.style.display = "none";
          debug.style.display = "none";
        }

        updateModeToggle();
        updateEditorVisibility();
        displayEditor.update({
          text: hotzoneState.displayText,
          locked: true,
          enabled: hotzoneState.debugVisible,
          widthPx: hotzoneState.widthPx,
          heightPx: hotzoneState.heightPx,
          color: hotzoneState.color,
          textColor: hotzoneState.displayTextColor,
          textBold: hotzoneState.displayTextBold,
          textSizeLevel: hotzoneState.displayTextSizeLevel,
          pinned: hotzoneState.pinned === true,
          collapsed,
          displayCount: Number.isFinite(payload.displayCount) ? payload.displayCount : 1
        });
      });

      window.addEventListener("dragover", (event) => {
        event.preventDefault();
        if (collapsed) {
          isFileDragging = false;
          updateEditorVisibility();
          window.overlayApi.emitDragPosition({
            x: event.screenX,
            y: event.screenY,
            fileDrag: false,
            paths: []
          });
          return;
        }
        const localY = event.clientY;
        if (localY <= headerHeight) {
          isFileDragging = false;
          updateEditorVisibility();
          window.overlayApi.emitDragPosition({
            x: event.screenX,
            y: event.screenY,
            fileDrag: false,
            paths: []
          });
          return;
        }
        isFileDragging = detectFileDrag(event.dataTransfer);
        updateEditorVisibility();
        window.overlayApi.emitDragPosition({
          x: event.screenX,
          y: event.screenY,
          fileDrag: isFileDragging,
          paths: getDraggedPaths(event.dataTransfer)
        });
      });

      window.addEventListener("drop", (event) => {
        event.preventDefault();
        if (collapsed) {
          isFileDragging = false;
          updateEditorVisibility();
          window.overlayApi.emitDragEnd();
          return;
        }
        const localY = event.clientY;
        if (localY <= headerHeight) {
          isFileDragging = false;
          updateEditorVisibility();
          window.overlayApi.emitDragEnd();
          return;
        }
        isFileDragging = false;
        updateEditorVisibility();
        window.overlayApi.emitDragEnd();
      });

      window.addEventListener("dragleave", () => {
        isFileDragging = false;
        updateEditorVisibility();
        return;
      });

      window.addEventListener("dragend", () => {
        isFileDragging = false;
        updateEditorVisibility();
      });
    </script>
  </body>
</html>
